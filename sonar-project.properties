
sonar.host.url=http://localhost:9000

# Authentication: set SONAR_TOKEN in the environment (recommended) or pass -Dsonar.token=... to sonar-scanner.
# Do not commit tokens to this file.

sonar.projectKey=multi-user-frontend
sonar.projectName=Multi User Frontend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=test

sonar.sourceEncoding=UTF-8
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.language=js

# Exclude nested CDP app (has its own Sonar project) and build artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/cdp-frontend/**,**/.scannerwork/**
