server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Allow embedding in Converse launcher iframe (repeated per location — nginx drops parent add_header when a child sets any add_header).
    location / {
        add_header Content-Security-Policy "frame-ancestors 'self' https://converse.showroom.lumegalabs.com https://converse-ui.showroom.lumegalabs.com http://localhost:3000 http://127.0.0.1:3000 http://localhost:5173" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Content-Security-Policy "frame-ancestors 'self' https://converse.showroom.lumegalabs.com https://converse-ui.showroom.lumegalabs.com http://localhost:3000 http://127.0.0.1:3000 http://localhost:5173" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Content-Security-Policy "frame-ancestors 'self' https://converse.showroom.lumegalabs.com https://converse-ui.showroom.lumegalabs.com http://localhost:3000 http://127.0.0.1:3000 http://localhost:5173" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
